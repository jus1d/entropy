services:
  api:
    build: .
    container_name: api
    restart: unless-stopped
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
    ports:
      - "5919:5919"
    volumes:
      - ./config:/app/config
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:5919/liveness || exit 1
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "default"
    healthcheck:
      test: clickhouse-client --query "SELECT 1" || exit 1
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

volumes:
  clickhouse_data:
  clickhouse_logs:
  prometheus_data:
