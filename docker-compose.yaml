services:
  api:
    build: .
    container_name: api
    restart: unless-stopped
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
    ports:
      - "5919:5919"
    volumes:
      - ./config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:5919/liveness || exit 1
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

volumes:
  prometheus_data:
